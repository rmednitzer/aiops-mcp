suite: default-deny NetworkPolicy
templates:
  - templates/networkpolicy.yaml
release:
  name: praxis
tests:
  - it: renders a NetworkPolicy by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress
  - it: can be disabled
    set:
      networkPolicy:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # Fail closed (BL-051): with no peer named, the ingress key is omitted while
  # policyTypes still lists Ingress, the canonical deny-all-ingress shape.
  - it: denies all ingress when no peer is named (the default)
    asserts:
      - notExists:
          path: spec.ingress
      - contains:
          path: spec.policyTypes
          content: Ingress
  - it: admits only the named peer on the MCP port when one is set
    set:
      networkPolicy:
        ingressFrom:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: mcp-client
    asserts:
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/name"]
          value: mcp-client
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 8765
      - equal:
          path: spec.ingress[0].ports[0].protocol
          value: TCP

  # Egress is default-deny except DNS to kube-system, which is always present.
  - it: always permits DNS egress to the kube-system namespace only
    asserts:
      - equal:
          path: spec.egress[0].to[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: kube-system
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: TCP
            port: 53
  - it: adds no fleet egress rule when no CIDR is listed (default-deny)
    asserts:
      - lengthEqual:
          path: spec.egress
          count: 1

  # BL-087: the cloud metadata / link-local range is always excised from any
  # operator-listed fleet CIDR, alongside any operator-added exceptions.
  - it: excises 169.254.0.0/16 from every listed fleet CIDR
    set:
      networkPolicy:
        egressCIDRs:
          - cidr: 10.0.0.0/24
    asserts:
      - equal:
          path: spec.egress[1].to[0].ipBlock.cidr
          value: 10.0.0.0/24
      - contains:
          path: spec.egress[1].to[0].ipBlock.except
          content: 169.254.0.0/16
  - it: keeps the always-on excision when the operator adds their own except
    set:
      networkPolicy:
        egressCIDRs:
          - cidr: 10.1.0.0/16
            except:
              - 10.1.5.0/24
    asserts:
      - contains:
          path: spec.egress[1].to[0].ipBlock.except
          content: 169.254.0.0/16
      - contains:
          path: spec.egress[1].to[0].ipBlock.except
          content: 10.1.5.0/24
  - it: refuses a bare-string fleet CIDR (BL-087 shape change)
    set:
      networkPolicy:
        egressCIDRs:
          - 10.0.0.0/24
    asserts:
      - failedTemplate:
          errorPattern: "networkPolicy\\.egressCIDRs is now a list"
  - it: requires a non-empty cidr on every fleet egress entry
    set:
      networkPolicy:
        egressCIDRs:
          - except:
              - 10.1.5.0/24
    asserts:
      - failedTemplate:
          errorPattern: "every entry needs a non-empty"

  # BL-036 (opt-in): a namespace-wide default-deny baseline, OFF by default so it
  # never bricks co-tenant workloads; by default only the pod-scoped policy renders.
  - it: adds no namespace default-deny policy by default
    asserts:
      - hasDocuments:
          count: 1
  - it: adds an opt-in namespace-wide default-deny NetworkPolicy when enabled
    set:
      networkPolicy:
        namespaceDefaultDeny: true
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 1
        isKind:
          of: NetworkPolicy
      - documentIndex: 1
        matchRegex:
          path: metadata.name
          pattern: -namespace-default-deny$
      # An empty podSelector selects every pod (no matchLabels narrowing it).
      - documentIndex: 1
        notExists:
          path: spec.podSelector.matchLabels
      - documentIndex: 1
        contains:
          path: spec.policyTypes
          content: Ingress
      - documentIndex: 1
        contains:
          path: spec.policyTypes
          content: Egress
      # Deny-all: no ingress or egress allow-rules on the namespace baseline.
      - documentIndex: 1
        notExists:
          path: spec.ingress
      - documentIndex: 1
        notExists:
          path: spec.egress
