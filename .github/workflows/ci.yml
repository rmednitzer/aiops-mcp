name: ci

# Least-privilege default. Jobs request only what they need.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # Hash-locked install (BL-088): the gate runs against the exact, reviewed
      # dependency set, not whatever PyPI resolves on the day. Renovate maintains
      # the lock; bounds in pyproject keep local installs from drifting majors.
      - name: Install dev dependencies (hash-locked)
        run: |
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps
      - name: ci-success (lint + type-check + test + schema-drift + eval)
        run: make ci-success

  # Helm chart assertions (BL-032): render-time tests for the security posture, the
  # http-gated health probes, and the default-deny NetworkPolicy. Pinned helm and a
  # pinned plugin keep the gate reproducible (the repo's SHA-pin posture).
  helm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.21.1
      - name: Install helm-unittest (pinned)
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1
      - name: helm unittest
        run: make helm-test

  # Aggregate gate: branch protection requires this single check, which depends on
  # the full matrix and the helm chart tests. The security workflows (codeql,
  # dependency-review, sbom, fuzz) run alongside and are required via branch
  # protection.
  ci-success:
    needs: [check, helm-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ci-success required checks passed"
