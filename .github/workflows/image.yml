name: image

# Build the container image to validate the Dockerfile (BL-092, BL-033). Build
# only, never push: the published image and its digest are produced by the
# tag-triggered `release` workflow (release.yml, ADR-0035), not on every PR. This
# keeps the Dockerfile from rotting and gives the deploy manifests a CI-validated,
# buildable source.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build the image (validation only, no push)
        run: docker build --tag praxis:ci .
      - name: Smoke-test the image (package imports, runs non-root)
        # Proves the runtime venv is wired and the package and its runtime dep are
        # importable, and that the image runs as a non-root uid by construction
        # (BL-092). The transport guard itself is covered by the Python suite.
        run: |
          docker run --rm --entrypoint python praxis:ci -c \
            "import os, praxis, pydantic; assert os.getuid() != 0, 'image must not run as root'; print('praxis ok, uid', os.getuid())"
