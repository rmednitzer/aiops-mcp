name: ci

# Least-privilege default. Jobs request only what they need.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: ci-success (lint + type-check + test + schema-drift + eval)
        run: make ci-success

  # Aggregate gate: branch protection requires this single check, which depends on
  # the full matrix. The security workflows (codeql, dependency-review, sbom, fuzz)
  # run alongside and are required via branch protection.
  ci-success:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ci-success required checks passed"
