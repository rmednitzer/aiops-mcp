{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "praxis.fullname" . }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "praxis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # Default-deny: ingress is allowed only on the MCP port; egress only to DNS and
  # the explicitly listed fleet CIDRs (SEC-7 in spirit; the SSRF filter is the
  # in-process complement).
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.http.port }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egressCIDRs }}
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
