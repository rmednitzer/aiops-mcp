name: ci

# Least-privilege default. Jobs request only what they need.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      # Hash-locked install (BL-088): the gate runs against the exact, reviewed
      # dependency set, not whatever PyPI resolves on the day. Renovate maintains
      # the lock; bounds in pyproject keep local installs from drifting majors.
      - name: Install dev dependencies (hash-locked)
        run: |
          python -m pip install --require-hashes -r requirements-dev.txt
          python -m pip install -e . --no-deps
      - name: ci-success (lint + type-check + test + schema-drift + eval)
        run: make ci-success

  # Helm chart assertions (BL-032): render-time tests for the security posture, the
  # http-gated health probes, and the default-deny NetworkPolicy. Pinned helm and a
  # pinned plugin keep the gate reproducible (the repo's SHA-pin posture).
  helm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.1
      - name: Install helm-unittest (pinned)
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1 --verify=false
      - name: helm unittest
        run: make helm-test

  # Dependency-bound consistency (prevents the #57/#62 cryptography drift): the dev
  # and tsa extras carry duplicate, hand-maintained bounds that Renovate bumps
  # independently. A dry-run resolve of both extras together fails fast if they
  # diverge again (the hashed install uses --no-deps and would not catch it).
  deps-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Resolve dev+tsa extras together (no install)
        run: python -m pip install --dry-run '.[dev,tsa]'

  # CodeQL and dependency-review are folded into the required ci-success aggregate
  # (BL-052) by calling them as reusable workflows, so the single required check
  # transitively requires them in-repo -- not via external branch-protection config.
  # CodeQL also runs standalone on the weekly schedule (full scan); fuzz (scheduled,
  # expensive) and sbom (push/release publish) deliberately stay out of the per-PR gate.
  codeql:
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: ./.github/workflows/codeql.yml

  dependency-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/dependency-review.yml

  # Aggregate gate: the ruleset requires only this check, which transitively requires
  # the test matrix, the helm tests, the dependency-consistency guard, and the CodeQL +
  # dependency-review security gates. `if: always()` with an explicit result check lets
  # it run when a gate is legitimately skipped (dependency-review on push) while still
  # failing on any failed or cancelled gate.
  ci-success:
    needs: [check, helm-test, deps-consistency, codeql, dependency-review]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all gates to have passed
        run: |
          for r in \
            "${{ needs.check.result }}" \
            "${{ needs.helm-test.result }}" \
            "${{ needs.deps-consistency.result }}" \
            "${{ needs.codeql.result }}" \
            "${{ needs.dependency-review.result }}"; do
            echo "gate result: $r"
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::a required gate did not pass ($r)"
              exit 1
            fi
          done
          echo "ci-success: all required gates passed"
