name: ci

# Least-privilege default. Jobs request only what they need.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: ci-success (lint + type-check + test + schema-drift + eval)
        run: make ci-success

  # Aggregate gate: branch protection requires this single check, which depends on
  # the full matrix. The security workflows (codeql, dependency-review, sbom, fuzz)
  # run alongside and are required via branch protection.
  ci-success:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ci-success required checks passed"
