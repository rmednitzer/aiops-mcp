suite: serviceaccount and service
templates:
  - templates/serviceaccount.yaml
  - templates/service.yaml
release:
  name: praxis
tests:
  - it: never mounts a Kubernetes API token (invariant 9)
    template: templates/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false
  - it: exposes the MCP port as a ClusterIP service
    template: templates/service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8765
      - equal:
          path: spec.ports[0].targetPort
          value: mcp-http
