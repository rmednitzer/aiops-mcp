name: ci

# Least-privilege default. Jobs request only what they need.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # BL-013: pin all actions to immutable commit SHAs before merge.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: make check
        run: make check

  # BL-013 adds: codeql, sbom, dependency-review, and a nightly fuzz workflow,
  # then a ci-success aggregate gate that requires all of them.
  ci-success:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - run: echo "ci-success: required checks passed"
