{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "praxis.fullname" . }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "praxis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # Default-deny: ingress is allowed only on the MCP port and only from the
  # peers named in networkPolicy.ingressFrom; with none named, the ingress key
  # is omitted entirely while policyTypes still lists Ingress, the canonical
  # Kubernetes deny-all-ingress shape (fail closed, BL-051). Egress only to DNS
  # and the explicitly listed fleet CIDRs (SEC-7 in spirit; the SSRF filter is
  # the in-process complement).
  {{- with .Values.networkPolicy.ingressFrom }}
  ingress:
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.http.port }}
  {{- end }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egressCIDRs }}
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
