{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "praxis.fullname" . }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "praxis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  # Default-deny: ingress is allowed only on the MCP port and only from the
  # peers named in networkPolicy.ingressFrom; with none named, the ingress key
  # is omitted entirely while policyTypes still lists Ingress, the canonical
  # Kubernetes deny-all-ingress shape (fail closed, BL-051). Egress only to DNS
  # and the explicitly listed fleet CIDRs (SEC-7 in spirit; the SSRF filter is
  # the in-process complement).
  {{- with .Values.networkPolicy.ingressFrom }}
  ingress:
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.http.port }}
  {{- end }}
  egress:
    # DNS only from the cluster DNS namespace (BL-087): the kubernetes.io/
    # metadata.name label is API-server-managed (immutable, since 1.21; the
    # chart floor is 1.27), so this cannot be spoofed by labeling a pod.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egressCIDRs }}
    - to:
        {{- range . }}
        {{- if kindIs "string" . }}
        {{- fail "networkPolicy.egressCIDRs is now a list of {cidr: <range>, except: [<sub-ranges>]} objects, not bare strings (BL-087): 169.254.0.0/16 is always excised. Rewrite each entry as `- cidr: <range>`." }}
        {{- end }}
        - ipBlock:
            # required: an entry with no cidr (for example only `except:`) would
            # otherwise render cidr: "" and apply as an invalid NetworkPolicy.
            cidr: {{ required "networkPolicy.egressCIDRs: every entry needs a non-empty `cidr` (BL-087)" .cidr | quote }}
            # The cloud metadata service and link-local are never legitimate
            # fleet egress; excise them even when the operator lists a broad
            # range (BL-087, the in-cluster complement to the SSRF filter).
            except:
              - 169.254.0.0/16
              {{- with .except }}
              {{- range . }}
              - {{ . | quote }}
              {{- end }}
              {{- end }}
        {{- end }}
    {{- end }}
{{- end }}
{{- if and .Values.networkPolicy.enabled .Values.networkPolicy.namespaceDefaultDeny }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "praxis.fullname" . }}-namespace-default-deny
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
spec:
  # Namespace-wide default-deny baseline (BL-036, opt-in via
  # networkPolicy.namespaceDefaultDeny). An empty podSelector selects every pod in the
  # namespace and, with no ingress/egress rules, permits nothing, so any pod lacking
  # its own allow-policy is denied. NetworkPolicies are additive: the praxis pod above
  # keeps its specific allows. Off by default because a deny-all baseline can brick
  # co-tenant workloads; enable only in a namespace praxis owns (ADR-0034).
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- end }}
